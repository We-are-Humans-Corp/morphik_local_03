[api]
host = "0.0.0.0"
port = 8000
reload = true

[auth]
jwt_algorithm = "HS256"
dev_mode = true
dev_entity_id = "dev_user"
dev_entity_type = "developer"
dev_permissions = ["read", "write", "admin"]

#### Registered models
[registered_models]
# OpenAI models
openai_gpt4-1 = { model_name = "gpt-4.1" }
openai_gpt4-1-mini = { model_name = "gpt-4.1-mini" }

# Anthropic models
claude_sonnet = { model_name = "claude-3-7-sonnet-latest" }

openai_embedding = { model_name = "text-embedding-3-small" }

#### Component configurations
[agent]
model = "openai_gpt4-1-mini"

[completion]
model = "openai_gpt4-1-mini"
default_max_tokens = "1000"
default_temperature = 0.3

[database]
provider = "postgres"
pool_size = 10
max_overflow = 15
pool_recycle = 3600
pool_timeout = 10
pool_pre_ping = true
max_retries = 3
retry_delay = 1.0

[embedding]
model = "openai_embedding"
dimensions = 1536
similarity_metric = "cosine"

[parser]
chunk_size = 6000
chunk_overlap = 300
use_unstructured_api = false
use_contextual_chunking = false

[reranker]
use_reranker = false

[storage]
provider = "local"
storage_path = "./storage"

[vector_store]
provider = "pgvector"

[multivector_store]
provider = "postgres"  # ВАЖНО: НЕ "morphik"!

[rules]
model = "openai_gpt4-1-mini"
batch_size = 4096

[morphik]
enable_colpali = true
mode = "self_hosted"
api_domain = "api.morphik.ai"
# КЛЮЧЕВАЯ НАСТРОЙКА: Используем существующий Modal endpoint
morphik_embedding_api_domain = "https://rugusev--morphik-processor-process-colpali.modal.run"
colpali_mode = "api"  # Используем внешний Modal API

[graph]
model = "openai_gpt4-1-mini"
enable_entity_resolution = true

[telemetry]
enabled = false
